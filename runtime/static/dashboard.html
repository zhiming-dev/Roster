
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Conclave — runtime dashboard</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a30;
      --panel-2: #1a2240;
      --line: #25305a;
      --text: #e7ecff;
      --muted: #8b97c2;
      --accent: #7aa2ff;
      --ok: #6ddc8c;
      --warn: #ffcc66;
      --err: #ff6b6b;
      --planner: #a78bfa;
      --coder: #6ddc8c;
      --reviewer: #ffcc66;
      --qa: #7aa2ff;
      --principal: #f0a3c7;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.45;
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
    }
    header h1 {
      font-size: 15px;
      margin: 0;
      letter-spacing: 0.04em;
      font-weight: 600;
    }
    header h1 span { color: var(--muted); font-weight: 400; }
    header .meta { color: var(--muted); font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    header button {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      margin-left: 10px;
    }
    header button:hover { color: var(--text); border-color: var(--accent); }

    #agents {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .agent-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      position: relative;
    }
    .agent-card .name {
      font-weight: 600;
      letter-spacing: 0.04em;
      font-size: 13px;
    }
    .agent-card .role-planner { color: var(--planner); }
    .agent-card .role-coder { color: var(--coder); }
    .agent-card .role-e2e { color: var(--reviewer); }
    .agent-card .role-reviewer { color: var(--reviewer); }
    .agent-card .role-qa { color: var(--qa); }
    .agent-card .role-researcher { color: var(--ok); }
    .agent-card .model {
      color: var(--muted);
      font-size: 11px;
      font-family: ui-monospace, monospace;
      margin-top: 2px;
      word-break: break-all;
    }
    .agent-card .status {
      display: inline-block;
      margin-top: 8px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .status-idle    { background: #25305a; color: var(--muted); }
    .status-queued  { background: #4a3a18; color: var(--warn); animation: pulse 1.6s infinite; }
    .status-thinking{ background: #2a3a72; color: var(--accent); animation: pulse 1.2s infinite; }
    .status-searching{ background: #15402e; color: var(--ok); animation: pulse 1.1s infinite; }
    .status-error   { background: #5a2533; color: var(--err); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

    .agent-card .provider-badge {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid var(--line);
      color: var(--muted);
      margin-left: 6px;
      vertical-align: middle;
    }
    .agent-card .provider-ollama { color: var(--qa); border-color: #2a4a72; }
    .agent-card .provider-azure_foundry { color: var(--planner); border-color: #4a3a72; }
    .agent-card .qmeta { color: var(--warn); font-size: 11px; margin-top: 4px; }

    .queue-meter {
      color: var(--muted);
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      margin-right: 12px;
    }
    .queue-meter b { color: var(--warn); font-weight: 600; }

    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: calc(100vh - 56px - 130px);
      min-height: 400px;
    }
    .pane { border-right: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0; }
    .pane:last-child { border-right: none; }
    .pane-title {
      padding: 8px 16px;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .pane-body { flex: 1; overflow-y: auto; padding: 12px 16px; }

    /* Chat */
    .msg { margin-bottom: 14px; }
    .msg .who { font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 600; margin-bottom: 3px; }
    .msg.principal .who { color: var(--principal); }
    .msg.planner   .who { color: var(--planner); }
    .msg .content { white-space: pre-wrap; word-wrap: break-word; }

    #chat-input-row {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }
    #chat-input {
      flex: 1;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 4px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      min-height: 40px;
      max-height: 160px;
    }
    #chat-input:focus { outline: none; border-color: var(--accent); }
    #chat-send {
      background: var(--accent);
      color: #0b1020;
      border: none;
      border-radius: 4px;
      padding: 0 16px;
      font-weight: 600;
      cursor: pointer;
    }
    #chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Event feed */
    .evt {
      border-bottom: 1px dashed var(--line);
      padding: 8px 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }
    .evt .head { color: var(--muted); margin-bottom: 2px; }
    .evt .arrow { color: var(--accent); }
    .evt .kind { color: var(--warn); margin-left: 6px; }
    .evt .body { color: var(--text); white-space: pre-wrap; word-break: break-word; max-height: 220px; overflow-y: auto; }
    .evt.thinking .body { color: var(--muted); font-style: italic; }
    .evt.task_assignment .kind { color: var(--coder); }
    .evt.task_result .kind { color: var(--ok); }
    .evt.search .kind { color: var(--ok); }
    .evt.search .body a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>Conclave <span>— runtime dashboard</span></h1>
    <div style="display:flex;align-items:center">
      <span class="queue-meter" id="queue-meter">queue: —</span>
      <span class="meta" id="run-id">run: —</span>
      <button id="reset-btn" title="Discard the current run and start a fresh one">Reset run</button>
    </div>
  </header>

  <section id="agents"></section>

  <main>
    <div class="pane">
      <div class="pane-title">Principal ⇄ Planner</div>
      <div class="pane-body" id="chat-log"></div>
      <div id="chat-input-row">
        <textarea id="chat-input" placeholder="Talk to the Planner… (Enter to send, Shift+Enter for newline)"></textarea>
        <button id="chat-send">Send</button>
      </div>
    </div>
    <div class="pane">
      <div class="pane-title">Inter-agent activity</div>
      <div class="pane-body" id="event-feed"></div>
    </div>
  </main>

<script>
const $ = (id) => document.getElementById(id);
const agentsEl = $("agents");
const chatLog = $("chat-log");
const feed = $("event-feed");
const input = $("chat-input");
const sendBtn = $("chat-send");
const runIdEl = $("run-id");

const agentState = new Map();
let queueState = null;

function renderQueueMeter() {
  const el = $("queue-meter");
  if (!queueState) { el.textContent = "queue: —"; return; }
  const { max_concurrency, waiting, active } = queueState;
  el.innerHTML = `queue: <b>${active}</b> active · <b>${waiting}</b> waiting · cap ${max_concurrency}`;
}

function renderAgents() {
  agentsEl.innerHTML = "";
  for (const a of agentState.values()) {
    const card = document.createElement("div");
    card.className = "agent-card";
    const provider = a.provider || "";
    const qmeta =
      a.status === "queued"
        ? `<div class="qmeta">⏳ queued${a.queue_waiting ? ` · ${a.queue_waiting} ahead` : ""}</div>`
        : a.queued
        ? `<div class="qmeta" style="color:var(--muted)">via queue</div>`
        : "";
    const searchBadge = a.search ? `<span class="provider-badge" style="color:var(--ok);border-color:#15402e">🌐 search</span>` : "";
    card.innerHTML = `
      <div class="name role-${escapeAttr(a.role)}">${escapeHtml(a.name)} <span style="color:var(--muted);font-weight:400">· ${escapeHtml(a.role)}</span><span class="provider-badge provider-${escapeAttr(provider)}">${escapeHtml(provider)}</span>${searchBadge}</div>
      <div class="model">${escapeHtml(a.model || "")}<br/>${escapeHtml(a.endpoint || "")}${a.system_prompt_chars ? `<br/>sys-prompt: ${a.system_prompt_chars.toLocaleString()} chars` : ""}</div>
      <span class="status status-${escapeAttr(a.status)}">${escapeHtml(a.status)}</span>
      ${qmeta}
    `;
    agentsEl.appendChild(card);
  }
}

function appendChat(who, content) {
  const div = document.createElement("div");
  div.className = "msg " + who;
  div.innerHTML = `<div class="who">${who}</div><div class="content"></div>`;
  div.querySelector(".content").textContent = content;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function appendEvent(e) {
  const div = document.createElement("div");
  const kind = e.kind || "event";
  div.className = "evt";
  let head, body;
  if (e.kind === "agent.message" || e.kind === "user.message") {
    const sub = e.subkind || "message";
    head = `<span>${escapeHtml(e.from)}</span> <span class="arrow">→</span> <span>${escapeHtml(e.to)}</span><span class="kind">${escapeHtml(sub)}</span>`;
    body = e.content || "";
    div.classList.add(sub);
  } else if (e.kind === "agent.status") {
    const q = e.status === "queued" && e.queue_waiting ? ` (${e.queue_waiting} ahead)` : "";
    head = `<span>${escapeHtml(e.agent)}</span><span class="kind">status: ${escapeHtml(e.status)}${q}</span>`;
    body = `${e.model || ""}${e.error ? "  error: " + e.error : ""}`;
  } else if (e.kind === "run.started") {
    head = `<span class="kind">run.started</span>`;
    body = e.runId || "";
    runIdEl.textContent = "run: " + (e.runId || "—");
    if (e.queue) { queueState = e.queue; renderQueueMeter(); }
  } else if (e.kind === "runtime.error") {
    head = `<span class="kind" style="color:var(--err)">runtime.error</span>`;
    body = (e.scope ? `[${e.scope}] ` : "") + (e.error || "");
  } else if (e.kind === "tool.search") {
    div.classList.add("search");
    const phase = e.phase || "";
    head = `<span>${escapeHtml(e.agent)}</span><span class="kind">🌐 search · ${escapeHtml(phase)}</span>`;
    if (phase === "query") {
      body = `"${e.query || ""}"`;
    } else if (phase === "results") {
      const items = (e.results || []).map((r, i) => `[${i + 1}] ${r.title}\n    ${r.url}`).join("\n");
      body = `${e.count || 0} results for "${e.query || ""}"\n${items}`;
    } else if (phase === "error") {
      body = `error for "${e.query || ""}": ${e.error || ""}`;
    } else {
      body = JSON.stringify(e);
    }
  } else {
    head = `<span class="kind">${escapeHtml(kind)}</span>`;
    body = JSON.stringify(e);
  }
  div.innerHTML = `<div class="head">${head}</div><div class="body"></div>`;
  div.querySelector(".body").textContent = body;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(s) { return String(s ?? "").replace(/[^a-z0-9_-]/gi, ""); }

async function loadAgents() {
  const r = await fetch("/api/agents");
  const j = await r.json();
  runIdEl.textContent = "run: " + j.runId;
  if (j.queue) { queueState = j.queue; renderQueueMeter(); }
  agentState.clear();
  for (const a of j.agents) agentState.set(a.name, a);
  renderAgents();
}

function connectWS() {
  const ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws");
  ws.onmessage = (msg) => {
    const e = JSON.parse(msg.data);
    if (e.kind === "agent.status") {
      const cur = agentState.get(e.agent) || { name: e.agent };
      Object.assign(cur, e);
      agentState.set(e.agent, cur);
      // Derive a rough live queue meter from agent transitions.
      refreshQueueFromAgents();
      renderAgents();
    } else if (e.kind === "run.started" && e.queue) {
      queueState = e.queue;
      renderQueueMeter();
    }
    appendEvent(e);
  };
  ws.onclose = () => setTimeout(connectWS, 1500);
}

function refreshQueueFromAgents() {
  if (!queueState) return;
  let waiting = 0, active = 0;
  for (const a of agentState.values()) {
    if (a.status === "queued") waiting++;
    else if (a.status === "thinking" && a.queued) active++;
  }
  queueState = { ...queueState, waiting, active };
  renderQueueMeter();
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  appendChat("principal", text);
  sendBtn.disabled = true;
  try {
    const r = await fetch("/api/chat", {
      method: "POST",
      headers: {"content-type": "application/json"},
      body: JSON.stringify({message: text}),
    });
    let j;
    try { j = await r.json(); }
    catch (_) { j = {error: `HTTP ${r.status}: ${(await r.text()).slice(0, 200)}`}; }
    if (j.error) appendChat("planner", "[error] " + j.error);
    else appendChat("planner", j.reply || "");
  } catch (e) {
    appendChat("planner", "[network error] " + e.message);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.addEventListener("click", send);
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

$("reset-btn").addEventListener("click", async () => {
  if (!confirm("Discard the current run? Chat history and in-memory agent state will be cleared.")) return;
  await fetch("/api/reset", {method: "POST"});
  chatLog.innerHTML = "";
  feed.innerHTML = "";
  await loadAgents();
});

loadAgents();
connectWS();
</script>
</body>
</html>
