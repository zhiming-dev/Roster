# Roster runtime — Docker Compose.
#
# Runs the whole runtime in a container with its embedded SQLite database (and
# run artifacts) persisted on the `roster-data` named volume. This is how you
# "run SQLite via Docker" here: SQLite is file-based, so the database is the
# roster.db file living on the mounted volume — no separate DB server needed.
#
#   cd runtime
#   docker compose up --build
#   open http://localhost:8765/
#
# History (conversations + inter-agent events) is written to /data/roster.db on
# the volume and survives `docker compose down` (use `down -v` to wipe it).

name: roster

services:
  roster:
    build:
      context: ..                     # repo root — agents live outside runtime/
      dockerfile: runtime/Dockerfile
    image: roster-runtime
    container_name: roster-runtime
    ports:
      - "8765:8765"
    environment:
      ROSTER_DB_PATH: /data/roster.db
      ROSTER_RUNS_DIR: /data/runs
      # Provide model secrets via the environment instead of committing them in
      # agents.config.yaml. The config already supports ${ENV_VAR} expansion and
      # per-agent overrides like ROSTER_PLANNER_API_KEY / _ENDPOINT / _MODEL.
      # ROSTER_PLANNER_API_KEY: ${ROSTER_PLANNER_API_KEY:-}
    # To load secrets from a local file, create runtime/.env (KEY=value lines)
    # and uncomment the next two lines:
    # env_file:
    #   - .env
    volumes:
      - roster-data:/data
    extra_hosts:
      # Lets an agent configured for a LOCAL Ollama reach the host daemon at
      # http://host.docker.internal:11434 from inside the container.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  roster-data:
